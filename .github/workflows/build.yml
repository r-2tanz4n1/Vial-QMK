name: Build Vial firmware

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli@sha256:16c4916e95b99bf88d27b15aec8db409ee17265d1710287fde248c6666508966

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v5
        with:
          path: custom

      - name: Checkout Vial-QMK
        uses: actions/checkout@v5
        with:
          repository: vial-kb/vial-qmk
          ref: vial
          submodules: recursive
          path: vial-qmk

      - name: Mark directories as safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE/custom"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/vial-qmk"

      - name: Install QMK/Vial Python dependencies
        working-directory: vial-qmk
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade qmk milc
          python3 -m pip install --upgrade -r requirements.txt

      - name: Copy Sofle Blue files
        run: |
          mkdir -p vial-qmk/keyboards/sofle
          cp -r custom/keyboards/sofle/blue vial-qmk/keyboards/sofle/

      - name: Copy Corne 4.1 files
        run: |
          mkdir -p vial-qmk/keyboards/crkbd/rev4/keymaps
          cp -r custom/keyboards/crkbd/rev4/keymaps/vial vial-qmk/keyboards/crkbd/rev4/keymaps/

      - name: Build Sofle Blue firmware
        working-directory: vial-qmk
        run: qmk compile -kb sofle/blue -km vial -e CONVERT_TO=promicro_rp2040

      - name: Build Corne 4.1 firmware
        working-directory: vial-qmk
        run: qmk compile -kb crkbd/rev4 -km vial

      - name: Find firmware files
        run: |
          find vial-qmk -type f \( -name "*.uf2" -o -name "*.hex" -o -name "*.bin" \)

      - name: Upload Sofle Blue firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle-blue-vial-firmware
          path: |
            vial-qmk/**/*sofle*.uf2
            vial-qmk/**/*sofle*.hex
            vial-qmk/**/*sofle*.bin
          if-no-files-found: error

      - name: Upload Corne 4.1 firmware
        uses: actions/upload-artifact@v4
        with:
          name: corne-4.1-vial-firmware
          path: |
            vial-qmk/**/*crkbd*.uf2
            vial-qmk/**/*crkbd*.hex
            vial-qmk/**/*crkbd*.bin
          if-no-files-found: error
