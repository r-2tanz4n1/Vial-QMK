name: Build Vial firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Checkout custom files
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Checkout Vial-QMK
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          ref: vial
          submodules: recursive
          path: vial-qmk

      - name: Copy custom keyboard files
        run: |
          mkdir -p vial-qmk/keyboards/sofle/blue/keymaps
          cp -r custom/keyboards/sofle/blue/keymaps/vial vial-qmk/keyboards/sofle/blue/keymaps/

      - name: Build firmware
        working-directory: vial-qmk
        run: qmk compile -kb sofle/blue -km vial -e CONVERT_TO=promicro_rp2040

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle-blue-vial-firmware
          path: |
            vial-qmk/.build/*.uf2
            vial-qmk/.build/*.hex
            vial-qmk/.build/*.bin